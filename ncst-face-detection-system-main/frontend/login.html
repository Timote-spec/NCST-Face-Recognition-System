<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCST Face Recognition — Admin Login</title>
  <style>
    :root {
      --ncst-navy: #0a2463;
      --ncst-navy-light: #1e3a7a;
      --ncst-yellow: #ffd100;
      --ncst-yellow-dark: #e6bc00;
      --ncst-text: #0a2463;
      --ncst-muted: #5a6b8c;
      --ncst-border: #c5cfe0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      background: var(--ncst-navy);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    body::before {
      width: 420px;
      height: 420px;
      top: -120px;
      left: -100px;
    }

    body::after {
      width: 520px;
      height: 520px;
      bottom: -180px;
      right: -140px;
      background: rgba(255, 255, 255, 0.03);
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem 2.25rem 2rem;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
      border-top: 4px solid var(--ncst-yellow);
      border-bottom: 4px solid var(--ncst-yellow);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .logo-wrap img {
      width: 120px;
      height: auto;
      object-fit: contain;
    }

    .title {
      text-align: center;
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--ncst-text);
      margin-bottom: 0.375rem;
      letter-spacing: -0.01em;
    }

    .subtitle {
      text-align: center;
      font-size: 0.875rem;
      color: var(--ncst-muted);
      margin-bottom: 1.75rem;
    }

    .banner {
      display: none;
      font-size: 0.8125rem;
      padding: 0.625rem 0.875rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
    }

    .banner.show { display: block; }

    .field { margin-bottom: 1.125rem; }

    .field label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--ncst-text);
      margin-bottom: 0.375rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.625rem 2.5rem 0.625rem 0.875rem;
      border: 1.5px solid var(--ncst-border);
      border-radius: 8px;
      font-size: 0.9375rem;
      color: var(--ncst-text);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-wrap input::placeholder { color: #94a3b8; }

    .input-wrap input:focus {
      outline: none;
      border-color: var(--ncst-navy);
      box-shadow: 0 0 0 3px rgba(10, 36, 99, 0.12);
    }

    .toggle-pw {
      position: absolute;
      right: 0.625rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ncst-navy);
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-pw svg { width: 1.125rem; height: 1.125rem; }

    .btn-login {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: var(--ncst-navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-login:hover:not(:disabled) { background: var(--ncst-navy-light); }
    .btn-login:active:not(:disabled) { transform: scale(0.99); }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    .demo-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: var(--ncst-muted);
    }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 0.875rem;
      font-size: 0.8125rem;
      color: var(--ncst-navy);
      text-decoration: none;
    }

    .forgot-link:hover { text-decoration: underline; }

    .terminal-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8125rem;
      color: var(--ncst-yellow);
      text-decoration: none;
    }

    .terminal-link:hover { text-decoration: underline; }

    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-wrap">
      <img src="/static/images/ncst-logo.png" alt="NCST Logo">
    </div>
    <h1 class="title">NCST Face Recognition</h1>
    <p class="subtitle">Admin Login — Secure Access Required</p>

    <div id="banner" class="banner" role="alert"></div>

    <form id="form-login" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" name="email" required autocomplete="email"
            placeholder="Enter your email address">
        </div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" required autocomplete="current-password"
            placeholder="Enter your password">
          <button type="button" class="toggle-pw" id="btn-toggle-pw" aria-label="Show password">
            <svg id="icon-eye" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="btn-submit">Log In</button>
    </form>

    <a href="/forgot-password" class="forgot-link">Forgot password?</a>
    <a href="/register" class="forgot-link">Create admin account</a>

    <p class="demo-note">Registration is limited to authorized emails only.</p>
    <a href="/#/terminal" class="terminal-link">Open attendance terminal (public)</a>
  </div>

  <script>
    const API_BASE = '/api/v1';

    function isAuthenticated() {
      const token = localStorage.getItem('ncst_token');
      if (!token) return false;
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.exp * 1000 < Date.now()) {
          localStorage.removeItem('ncst_token');
          localStorage.removeItem('ncst_user');
          return false;
        }
        return true;
      } catch {
        localStorage.removeItem('ncst_token');
        localStorage.removeItem('ncst_user');
        return false;
      }
    }

    if (isAuthenticated()) {
      window.location.replace('/');
    }

    const form = document.getElementById('form-login');
    const banner = document.getElementById('banner');
    const btn = document.getElementById('btn-submit');
    const pwInput = document.getElementById('password');
    const toggleBtn = document.getElementById('btn-toggle-pw');

    toggleBtn.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      toggleBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      banner.classList.remove('show');
      banner.textContent = '';

      const email = form.email.value.trim().toLowerCase();
      const password = form.password.value;
      if (!email || !password) {
        banner.textContent = 'Please enter your email and password.';
        banner.classList.add('show');
        return;
      }

      const origText = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch(API_BASE + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json().catch(() => null);
        if (!res.ok) throw new Error(data?.detail || 'Invalid email or password');

        localStorage.setItem('ncst_token', data.access_token);
        localStorage.setItem('ncst_user', JSON.stringify({ email }));
        window.location.replace('/');
      } catch (err) {
        banner.textContent = err.message;
        banner.classList.add('show');
        btn.disabled = false;
        btn.textContent = origText;
      }
    });
  </script>
</body>
</html>
