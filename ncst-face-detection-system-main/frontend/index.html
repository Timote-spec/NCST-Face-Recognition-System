<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCST Face Recognition</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root {
      --ncst-navy: #0a2463;
      --ncst-navy-light: #1e3a7a;
      --ncst-navy-muted: rgba(10, 36, 99, 0.08);
      --ncst-yellow: #ffd100;
      --ncst-yellow-light: #fff8dc;
    }

    html { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    body { background-color: #f4f6fb; color: var(--ncst-navy); }
    .spinner { border: 2px solid #e2e8f0; border-top-color: var(--ncst-navy); border-radius: 50%; width: 1.25rem; height: 1.25rem; animation: spin .6s linear infinite; display: inline-block; }
    .spinner-light { border-color: rgba(255,255,255,.3); border-top-color: #fff; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 50; transition: opacity .2s, transform .2s; }
    .toast.hide { opacity: 0; transform: translateY(0.5rem); pointer-events: none; }

    .was-validated input:invalid:not([type="checkbox"]),
    .was-validated input:invalid:not([type="checkbox"]) ~ .field-icon { border-color: #dc2626; }
    .was-validated input:valid:not([type="checkbox"]) { border-color: #22c55e; }
    .error-msg { display: none; }
    .was-validated input:invalid ~ .error-msg { display: block; }

    .toggle-track { width: 2.25rem; height: 1.25rem; background: #cbd5e1; border-radius: 999px; transition: background .2s; position: relative; cursor: pointer; flex-shrink: 0; }
    .toggle-track.active { background: var(--ncst-navy); }
    .toggle-thumb { position: absolute; top: 0.125rem; left: 0.125rem; width: 1rem; height: 1rem; background: #fff; border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.15); transition: transform .2s; }
    .toggle-track.active .toggle-thumb { transform: translateX(1rem); }

    .slide-panel { position: fixed; top: 0; right: 0; height: 100%; width: 20rem; background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,.1); border-left: 1px solid #e2e8f0; z-index: 40; transform: translateX(100%); transition: transform .3s cubic-bezier(.22,1,.36,1); }
    .slide-panel.open { transform: translateX(0); }

    .cam-bracket { position: absolute; inset: 0.75rem; pointer-events: none; }
    .cam-bracket::before { content: ''; position: absolute; top: 0; left: 0; width: 1.5rem; height: 1.5rem; border-top: 3px solid rgba(255,209,0,.7); border-left: 3px solid rgba(255,209,0,.7); border-radius: 4px 0 0 0; }
    .cam-bracket::after { content: ''; position: absolute; top: 0; right: 0; width: 1.5rem; height: 1.5rem; border-top: 3px solid rgba(255,209,0,.7); border-right: 3px solid rgba(255,209,0,.7); border-radius: 0 4px 0 0; }
    .cam-bracket .bl { position: absolute; bottom: 0; left: 0; width: 1.5rem; height: 1.5rem; border-bottom: 3px solid rgba(255,209,0,.7); border-left: 3px solid rgba(255,209,0,.7); border-radius: 0 0 0 4px; }
    .cam-bracket .br { position: absolute; bottom: 0; right: 0; width: 1.5rem; height: 1.5rem; border-bottom: 3px solid rgba(255,209,0,.7); border-right: 3px solid rgba(255,209,0,.7); border-radius: 0 0 4px 0; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(10,36,99,.55); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal-card { background: #fff; border-radius: .5rem; width: 100%; max-width: 32rem; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15); border-top: 3px solid var(--ncst-yellow); }

    .sidebar-item { display: flex; align-items: center; gap: .75rem; padding: .5rem .75rem; border-radius: .375rem; font-size: .875rem; color: rgba(255,255,255,.75); transition: background .15s, color .15s; cursor: pointer; }
    .sidebar-item:hover { background: rgba(255,255,255,.1); color: #fff; }
    .sidebar-item.active { background: var(--ncst-yellow); color: var(--ncst-navy); font-weight: 600; }

    .badge { display: inline-flex; align-items: center; padding: .125rem .5rem; border-radius: 999px; font-size: .75rem; font-weight: 500; line-height: 1.25rem; }
    .badge-student { background: #dbeafe; color: #1d4ed8; }
    .badge-staff { background: #d1fae5; color: #047857; }
    .badge-faculty { background: var(--ncst-yellow-light); color: #92400e; }
    .badge-active { background: #d1fae5; color: #047857; }
    .badge-archived { background: #f1f5f9; color: #64748b; }

    .pagination-btn { padding: .375rem .75rem; border: 1px solid #e2e8f0; border-radius: .375rem; font-size: .8125rem; color: #475569; background: #fff; transition: background .15s, color .15s; }
    .pagination-btn:hover:not(:disabled) { background: var(--ncst-navy-muted); color: var(--ncst-navy); }
    .pagination-btn:disabled { opacity: .4; cursor: not-allowed; }
    .pagination-btn.active { background: var(--ncst-navy); color: #fff; border-color: var(--ncst-navy); }

    .progress-bar { height: 0.5rem; border-radius: 999px; background: #f1f5f9; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 999px; background: var(--ncst-navy); transition: width .6s ease; }

    .bg-ncst-navy { background-color: var(--ncst-navy); }
    .bg-ncst-navy-light { background-color: var(--ncst-navy-light); }
    .bg-ncst-yellow { background-color: var(--ncst-yellow); }
    .bg-ncst-muted { background-color: var(--ncst-navy-muted); }
    .text-ncst-navy { color: var(--ncst-navy); }
    .text-ncst-yellow { color: var(--ncst-yellow); }
    .border-ncst-navy { border-color: var(--ncst-navy); }
    .border-ncst-yellow { border-color: var(--ncst-yellow); }
    .hover\:bg-ncst-navy-light:hover { background-color: var(--ncst-navy-light); }
    .hover\:bg-ncst-muted:hover { background-color: var(--ncst-navy-muted); }
    .focus\:ring-ncst:focus { outline: none; box-shadow: 0 0 0 2px rgba(10,36,99,.25); }

    .stat-card { border: 1px solid #e2e8f0; border-radius: .5rem; background: #fff; padding: 1rem; border-left: 4px solid var(--ncst-yellow); }
    .panel-card { border: 1px solid #e2e8f0; border-radius: .5rem; background: #fff; }

    @media (max-width: 1023px) {
      .sidebar-overlay { position: fixed; inset: 0; background: rgba(10,36,99,.5); z-index: 30; }
      .sidebar-mobile { position: fixed; top: 0; left: 0; height: 100%; z-index: 40; transform: translateX(-100%); transition: transform .25s cubic-bezier(.22,1,.36,1); }
      .sidebar-mobile.open { transform: translateX(0); }
    }
  </style>
</head>
<body class="antialiased leading-relaxed">

  <div id="app" class="min-h-screen flex flex-col"></div>
  <div id="toast-container"></div>

  <script>
    /* ============================================================
       STATE
       ============================================================ */
    const State = {
      getToken()       { return localStorage.getItem('ncst_token'); },
      setToken(t)      { localStorage.setItem('ncst_token', t); },
      clearToken()     { localStorage.removeItem('ncst_token'); },
      getUser()        { const u = localStorage.getItem('ncst_user'); return u ? JSON.parse(u) : null; },
      setUser(u)       { localStorage.setItem('ncst_user', JSON.stringify(u)); },
      clearUser()      { localStorage.removeItem('ncst_user'); },
      clear()          { this.clearToken(); this.clearUser(); },
      isAuthenticated(){ return !!this.getToken(); }
    };

    function isAuthenticated() {
      const token = State.getToken();
      if (!token) return false;
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.exp * 1000 < Date.now()) {
          State.clear();
          return false;
        }
        return true;
      } catch {
        State.clear();
        return false;
      }
    }

    /* ============================================================
       TOAST
       ============================================================ */
    function showToast(msg, type) {
      const c = document.getElementById('toast-container');
      const colors = { success: 'bg-emerald-600', error: 'bg-red-600', info: 'bg-slate-700' };
      const el = document.createElement('div');
      el.className = `toast ${colors[type] || 'bg-slate-700'} text-white px-4 py-2.5 rounded text-sm shadow-lg`;
      el.textContent = msg;
      c.appendChild(el);
      requestAnimationFrame(() => { el.style.opacity = '1'; });
      setTimeout(() => { el.classList.add('hide'); setTimeout(() => el.remove(), 250); }, 3500);
    }

    /* ============================================================
       API CLIENT
       ============================================================ */
    const API_BASE = '/api/v1';

    async function api(path, opts = {}) {
      const isFormData = opts.body instanceof FormData;
      const headers = { ...opts.headers };
      if (!isFormData) headers['Content-Type'] = 'application/json';
      const token = State.getToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(API_BASE + path, { ...opts, headers });
      if (res.status === 401 && token && !path.includes('/verify')) {
        State.clear();
        showToast('Session expired. Please sign in again.', 'error');
        window.location.href = '/login';
        throw new Error('Session expired');
      }
      const data = res.headers.get('content-type')?.includes('application/json') ? await res.json() : null;
      if (!res.ok) throw new Error(data?.detail || `Request failed (${res.status})`);
      return data;
    }

    /* ============================================================
       FORM HELPERS
       ============================================================ */
    function showFormError(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }
    function hideFormError(el) { el.classList.add('hidden'); }
    function setLoading(btn, loading) {
      if (loading) {
        btn.dataset.text = btn.innerHTML;
        btn.innerHTML = '<span class="spinner spinner-light align-middle"></span>';
        btn.disabled = true;
      } else {
        btn.innerHTML = btn.dataset.text || 'Submit';
        btn.disabled = false;
      }
    }
    function todayISO() {
      const f = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' });
      return f.format(new Date());
    }
    function fmtPST(ts) {
      if (!ts) return '\u2014';
      return new Date(ts).toLocaleString('en-US', { timeZone: 'Asia/Manila' });
    }

    /* ============================================================
       HASH ROUTER
       ============================================================ */
    let __activeStream = null;

    const Router = {
      routes: {},
      _cleanup: null,

      add(pattern, handler) {
        this.routes[pattern] = handler;
      },

      navigate(hash) {
        window.location.hash = hash;
      },

      resolve() {
        if (this._cleanup) { try { this._cleanup(); } catch(e) {} this._cleanup = null; }
        if (__activeStream) {
          __activeStream.getTracks().forEach(t => t.stop());
          __activeStream = null;
        }

        const rawHash = window.location.hash.slice(1) || '/dashboard';
        const authed = isAuthenticated();
        const isPublicPage = rawHash === '/terminal';
        const isDashPage = rawHash === '/dashboard' || rawHash.startsWith('/dashboard/');

        if (!authed && !isPublicPage) {
          window.location.href = '/login';
          return;
        }
        if (authed && isPublicPage === false && (rawHash === '/login' || rawHash === '/register-admin' || rawHash === '/forgot-password')) {
          window.location.hash = '/dashboard';
          return;
        }

        const hash = window.location.hash.slice(1) || '/dashboard';
        let handler = null, params = {};
        for (const [pattern, fn] of Object.entries(this.routes)) {
          const keys = [];
          const re = new RegExp('^' + pattern.replace(/:(\w+)/g, (_, k) => { keys.push(k); return '([^/]+)'; }) + '$');
          const m = re.exec(hash);
          if (m) { handler = fn; keys.forEach((k, i) => { params[k] = decodeURIComponent(m[i + 1]); }); break; }
        }
        if (!handler) handler = this.routes['/dashboard'] || (() => '<p class="p-8 text-slate-500">Page not found.</p>');
        const root = document.getElementById('app');
        const html = handler(params);
        if (typeof html === 'string') {
          root.innerHTML = html;
          if (root.__hook) root.__hook();
        } else if (html instanceof Promise) {
          root.innerHTML = '<div class="flex-1 flex items-center justify-center"><div class="spinner"></div></div>';
          html.then(h => { root.innerHTML = h; if (root.__hook) root.__hook(); });
        }
      },

      init() {
        window.addEventListener('hashchange', () => this.resolve());
        this.resolve();
      }
    };

    /* ============================================================
       SPLIT LAYOUT FOR AUTH
       ============================================================ */
    function splitLayout(content) {
      return `
        <div class="flex flex-1 min-h-screen">
          <div class="hidden lg:flex lg:w-1/2 bg-indigo-700 flex-col justify-between p-10 text-white">
            <div>
              <div class="flex items-center gap-3 mb-8">
                <div class="w-9 h-9 rounded-lg bg-white/20 flex items-center justify-center font-bold text-sm">N</div>
                <div>
                  <p class="font-semibold text-sm tracking-tight">NCST</p>
                  <p class="text-xs text-indigo-200">National College of Science &amp; Technology</p>
                </div>
              </div>
              <h2 class="text-2xl font-bold tracking-tight mb-2">Face Detection System</h2>
              <p class="text-indigo-200 text-sm leading-relaxed">Real-time facial recognition platform for automated attendance management and identity verification.</p>
              <div class="mt-8 space-y-3 text-sm text-indigo-100">
                <div class="flex items-start gap-3"><svg class="w-4 h-4 mt-0.5 text-indigo-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg><span>Real-time face detection &amp; encoding</span></div>
                <div class="flex items-start gap-3"><svg class="w-4 h-4 mt-0.5 text-indigo-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg><span>One-click attendance check-in</span></div>
                <div class="flex items-start gap-3"><svg class="w-4 h-4 mt-0.5 text-indigo-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg><span>Admin dashboard with analytics</span></div>
                <div class="flex items-start gap-3"><svg class="w-4 h-4 mt-0.5 text-indigo-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg><span>Secure JWT-based authentication</span></div>
              </div>
            </div>
            <div><p class="text-xs text-indigo-300">v1.0.0 &mdash; NCST Attendance System</p></div>
          </div>
          <div class="w-full lg:w-1/2 flex items-center justify-center px-6 py-10 bg-slate-50">
            <div class="w-full max-w-sm">${content}</div>
          </div>
        </div>`;
    }

    /* ============================================================
       VIEW: LOGIN  #/login
       ============================================================ */
    function loginView() {
      return splitLayout(`
        <h2 class="text-lg font-semibold text-slate-900 tracking-tight mb-1">Sign in</h2>
        <p class="text-sm text-slate-500 mb-6">Enter your credentials to access the dashboard.</p>
        <div id="login-banner" class="hidden text-sm px-3 py-2 rounded mb-4 border"></div>
        <form id="form-login" novalidate class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input type="email" name="email" required
              class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ncst focus:border-ncst-navy bg-white transition-colors">
            <p class="error-msg text-xs text-red-600 mt-1">Please enter a valid email address.</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input type="password" name="password" required
              class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ncst focus:border-ncst-navy bg-white transition-colors">
            <p class="error-msg text-xs text-red-600 mt-1">Password is required.</p>
          </div>
          <button type="submit"
            class="w-full bg-ncst-navy text-white rounded px-3 py-2 text-sm font-medium hover:bg-ncst-navy-light transition-colors focus:outline-none focus:ring-2 focus:ring-ncst disabled:opacity-60">Sign in</button>
        </form>
        <div class="mt-4 text-center space-x-3 text-sm text-slate-500">
          <a href="#/register-admin" class="text-ncst-navy hover:underline">Register admin</a>
          <a href="/forgot-password" class="text-ncst-navy hover:underline">Forgot password</a>
        </div>
        <div class="mt-4 text-center">
          <a href="#/terminal" class="text-sm text-ncst-navy hover:underline">Open attendance terminal</a>
        </div>
      `);
    }
    loginView.handler = () => {
      const form = document.getElementById('form-login');
      const banner = document.getElementById('login-banner');
      if (!form) return;
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        form.classList.add('was-validated');
        if (!form.checkValidity()) return;
        hideFormError(banner);
        const btn = form.querySelector('button[type="submit"]');
        setLoading(btn, true);
        const fd = new FormData(form);
        try {
          const data = await api('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') })
          });
          State.setToken(data.access_token);
          State.setUser({ email: fd.get('email') });
          showToast('Signed in successfully', 'success');
          Router.navigate('/dashboard');
        } catch (err) {
          if (err.message !== 'Session expired') {
            showFormError(banner, err.message);
            banner.className = 'text-sm px-3 py-2 rounded mb-4 border bg-red-50 border-red-200 text-red-700';
          }
        }
        setLoading(btn, false);
      });
    };

    /* ============================================================
       VIEW: REGISTER ADMIN  #/register-admin
       ============================================================ */
    function registerAdminView() {
      return splitLayout(`
        <h2 class="text-lg font-semibold text-slate-900 tracking-tight mb-1">Register admin</h2>
        <p class="text-sm text-slate-500 mb-6">Create an administrator account.</p>
        <div id="reg-banner" class="hidden text-sm px-3 py-2 rounded mb-4 border"></div>
        <form id="form-register" novalidate class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">First name</label>
              <input type="text" name="first_name" required
                class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ncst focus:border-ncst-navy bg-white transition-colors">
              <p class="error-msg text-xs text-red-600 mt-1">Required.</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Last name</label>
              <input type="text" name="last_name" required
                class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ncst focus:border-ncst-navy bg-white transition-colors">
              <p class="error-msg text-xs text-red-600 mt-1">Required.</p>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input type="email" name="email" required
              class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ncst focus:border-ncst-navy bg-white transition-colors">
            <p class="error-msg text-xs text-red-600 mt-1">Please enter a valid email address.</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input type="password" name="password" required minlength="6"
              class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ncst focus:border-ncst-navy bg-white transition-colors">
            <p class="error-msg text-xs text-red-600 mt-1">Password must be at least 6 characters.</p>
          </div>
          <button type="submit"
            class="w-full bg-ncst-navy text-white rounded px-3 py-2 text-sm font-medium hover:bg-ncst-navy-light transition-colors focus:outline-none focus:ring-2 focus:ring-ncst disabled:opacity-60">Register</button>
        </form>
        <div class="mt-4 text-center text-sm text-slate-500">
          Already have an account? <a href="/login" class="text-ncst-navy hover:underline">Sign in</a>
        </div>
      `);
    }
    registerAdminView.handler = () => {
      const form = document.getElementById('form-register');
      const banner = document.getElementById('reg-banner');
      if (!form) return;
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        form.classList.add('was-validated');
        if (!form.checkValidity()) return;
        hideFormError(banner);
        const btn = form.querySelector('button[type="submit"]');
        setLoading(btn, true);
        const fd = new FormData(form);
        const body = {
          admin_id: 'admin_' + Date.now(),
          first_name: fd.get('first_name'),
          last_name: fd.get('last_name'),
          email: fd.get('email'),
          password: fd.get('password')
        };
        try {
          await api('/auth/register', { method: 'POST', body: JSON.stringify(body) });
          showToast('Registration successful. Please sign in.', 'success');
          Router.navigate('/login');
        } catch (err) {
          if (err.message !== 'Session expired') {
            showFormError(banner, err.message);
            banner.className = 'text-sm px-3 py-2 rounded mb-4 border bg-red-50 border-red-200 text-red-700';
          }
        }
        setLoading(btn, false);
      });
    };

    /* ============================================================
       VIEW: FORGOT PASSWORD  #/forgot-password
       ============================================================ */
     function forgotPasswordView() {
       return splitLayout(`
         <h2 class="text-lg font-semibold text-slate-900 tracking-tight mb-1">Reset password</h2>
         <p class="text-sm text-slate-500 mb-6">Enter your admin recovery key and choose a new password.</p>
         <div id="forgot-banner" class="hidden text-sm px-3 py-2 rounded mb-4 border"></div>
         <form id="form-forgot" novalidate class="space-y-4">
           <div>
             <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
             <input type="email" name="email" required
               class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ncst focus:border-ncst-navy bg-white transition-colors">
             <p class="error-msg text-xs text-red-600 mt-1">Please enter a valid email address.</p>
           </div>
           <div>
             <label class="block text-sm font-medium text-slate-700 mb-1">Recovery Key</label>
             <input type="text" name="recovery_key" required
               class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ncst focus:border-ncst-navy bg-white">
             <p class="error-msg text-xs text-red-600 mt-1">Recovery key is required.</p>
           </div>
           <div>

    terminalView.handler = () => {
      const video = document.getElementById('term-video');
      const placeholder = document.getElementById('term-placeholder');
      const bracket = document.getElementById('cam-bracket');
      const overlay = document.getElementById('scan-overlay');
      const status = document.getElementById('term-status');
      const scanBtn = document.getElementById('btn-scan');
      const panel = document.getElementById('result-panel');
      const resultBody = document.getElementById('result-body');
      const autoTrack = document.getElementById('auto-track');
      const autoLabel = document.getElementById('auto-toggle-label');
      let stream = null, autoScan = false, scanning = false, cooldownActive = false, cooldownSec = 0;
      let _autoTimer = null, _cooldownTimer = null;

      function setStatus(msg) { status.textContent = msg; }

      function stopStream() {
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        video.classList.add('hidden');
        placeholder.classList.remove('hidden');
        scanBtn.disabled = true;
        bracket.style.display = 'none';
        setStatus('Camera inactive \u2014 press Start to begin');
      }

      function stopAutoScan() {
        if (_autoTimer) { clearInterval(_autoTimer); _autoTimer = null; }
        if (_cooldownTimer) { clearInterval(_cooldownTimer); _cooldownTimer = null; }
        cooldownActive = false;
      }

      function refreshStatus() {
        if (cooldownActive) { setStatus('Cooldown: ' + cooldownSec + 's'); }
        else if (scanning) { setStatus('Scanning\u2026'); }
        else if (stream) { setStatus(autoScan ? 'Auto-scan active (every 2.5s)' : 'Camera active'); }
        else { setStatus('Camera inactive \u2014 press Start to begin'); }
      }

      function startCooldown() {
        cooldownActive = true;
        cooldownSec = 6;
        refreshStatus();
        _cooldownTimer = setInterval(() => {
          cooldownSec--;
          if (cooldownSec <= 0) {
            clearInterval(_cooldownTimer);
            _cooldownTimer = null;
            cooldownActive = false;
            refreshStatus();
          } else {
            refreshStatus();
          }
        }, 1000);
      }

      async function captureAndVerify() {
        if (scanning || !stream) return;
        scanning = true;
        overlay.classList.remove('hidden');
        scanBtn.disabled = true;
        refreshStatus();
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(async (blob) => {
          if (!blob) { scanning = false; overlay.classList.add('hidden'); if (!autoScan) scanBtn.disabled = false; refreshStatus(); return; }
          const fd = new FormData();
          fd.append('device_id', 'terminal-01');
          fd.append('image', blob, 'scan.jpg');
          try {
            const res = await fetch(API_BASE + '/verify', { method: 'POST', body: fd });
            const data = res.headers.get('content-type')?.includes('application/json') ? await res.json() : null;
            if (!res.ok) { showResult(data || { detail: 'Verification failed' }, true); }
            else { showResult(data, false); if (autoScan) startCooldown(); }
          } catch (err) {
            showResult({ message: err.message }, true);
          }
          scanning = false;
          overlay.classList.add('hidden');
          if (!autoScan) scanBtn.disabled = false;
          refreshStatus();
        }, 'image/jpeg', 0.85);
      }

      function showResult(data, isError) {
        const ts = fmtPST(data.logged_at);
        if (isError) {
          resultBody.innerHTML = `
            <div class="border border-red-200 bg-red-50 rounded p-4 text-sm">
              <div class="flex items-center gap-2 mb-2">
                <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                <span class="font-semibold text-red-800">Verification Failed</span>
              </div>
              <p class="text-red-700">${data.detail || data.message || 'Face not recognized.'}</p>
              ${data.similarity !== undefined ? `<p class="text-red-600 mt-1 text-xs">Match: ${(data.similarity * 100).toFixed(1)}%</p>` : ''}
              <p class="text-red-400 text-xs mt-2">${ts}</p>
            </div>`;
        } else {
          resultBody.innerHTML = `
            <div class="border border-emerald-200 bg-emerald-50 rounded p-4 text-sm">
              <div class="flex items-center gap-2 mb-2">
                <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                <span class="font-semibold text-emerald-800">Check-In Successful</span>
              </div>
              <p class="text-emerald-700 font-medium">${data.user_name || 'Unknown'}</p>
              <p class="text-emerald-500 text-xs mt-2">${ts}</p>
            </div>`;
        }
        panel.classList.add('open');
        setTimeout(() => panel.classList.remove('open'), 5000);
      }

      document.getElementById('btn-start-cam')?.addEventListener('click', async () => {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
          __activeStream = stream;
          video.srcObject = stream;
          video.classList.remove('hidden');
          placeholder.classList.add('hidden');
          scanBtn.disabled = false;
          bracket.style.display = 'block';
          refreshStatus();
        } catch { showToast('Camera access denied.', 'error'); }
      });

      scanBtn.addEventListener('click', captureAndVerify);

      autoLabel?.addEventListener('click', (e) => {
        e.preventDefault();
        autoScan = !autoScan;
        autoTrack.classList.toggle('active', autoScan);
        if (autoScan) {
          scanBtn.disabled = true;
          stopAutoScan();
          _autoTimer = setInterval(() => {
            if (!scanning && !cooldownActive && stream) captureAndVerify();
          }, 2500);
        } else {
          stopAutoScan();
          scanBtn.disabled = !stream;
        }
        refreshStatus();
      });

      document.getElementById('btn-close-result')?.addEventListener('click', () => panel.classList.remove('open'));

      function cleanTerminal() {
        stopAutoScan();
        stopStream();
      }
      Router._cleanup = cleanTerminal;

    function exportLogsCSV() {
      api('/admin/logs?date_from=' + todayISO() + '&date_to=' + todayISO() + '&page_size=5000')
        .then(data => {
          if (!data.items || data.items.length === 0) { showToast('No logs to export today.', 'info'); return; }
          const cols = ['Log ID', 'Name', 'Role', 'Department/Section', 'Logged At (PST)', 'Device ID'];
          const rows = data.items.map(r => [
            r.log_id,
            (r.first_name || '') + ' ' + (r.last_name || ''),
            r.role || '',
            r.department_section || '',
            fmtPST(r.logged_at),
            r.device_id || ''
          ]);
          const csvContent = [cols, ...rows].map(row => row.map(escapeCSV).join(',')).join('\n');
          const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.setAttribute('href', url);
          link.setAttribute('download', 'Attendance_Export_' + new Date().toISOString().split('T')[0] + '.csv');
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
          showToast('CSV exported successfully.', 'success');
        })
        .catch(err => { if (err.message !== 'Session expired') showToast(err.message, 'error'); });
    }

    function renderAttendanceBreakdown(users, todayLogs) {
      const container = document.getElementById('att-breakdown-content');
      if (!container) return;
      const roles = [
        { key: 'STUDENT', label: 'Students', color: 'bg-ncst-navy' },
        { key: 'FACULTY', label: 'Faculty', color: 'bg-emerald-500' },
        { key: 'STAFF', label: 'Staff', color: 'bg-blue-500' }
      ];
      const activeUsers = Array.isArray(users) ? users.filter(u => u.status === 'ACTIVE' || !u.status) : [];
      const loggedIds = new Set((Array.isArray(todayLogs) ? todayLogs : []).map(l => l.user_id));
      const loggedUsers = Array.isArray(users) ? users.filter(u => loggedIds.has(u.user_id)) : [];
      container.innerHTML = roles.map(r => {
        const total = activeUsers.filter(u => u.role === r.key).length;
        const attended = loggedUsers.filter(u => u.role === r.key).length;
        const pct = total > 0 ? Math.round((attended / total) * 100) : 0;
        return `
          <div>
            <div class="flex items-center justify-between text-xs mb-1">
              <span class="font-medium text-slate-700">${r.label}</span>
              <span class="text-slate-500">${attended}/${total} (${pct}%)</span>
            </div>
            <div class="progress-bar">
              <div class="progress-bar-fill ${r.color}" style="width:${pct}%"></div>
            </div>

      const ping = await checkServerPing();

      try {
        await api('/admin/logs?page_size=1');

    async function loadOverview() {
      try {
        const [users, logsAll, logsToday] = await Promise.all([
          api('/admin/users'),
          api('/admin/logs?page_size=1'),
          api('/admin/logs?date_from=' + todayISO() + '&date_to=' + todayISO() + '&page_size=200'),
        ]);
        const allUsers = Array.isArray(users) ? users : [];
        const todayItems = logsToday?.items || [];
        const total = allUsers.length;
        const staffFaculty = allUsers.filter(u => (u.role === 'STAFF' || u.role === 'FACULTY') && u.status === 'ACTIVE').length;
        const elTotal = document.getElementById('ov-total');
        const elStaff = document.getElementById('ov-staff');
        const elToday = document.getElementById('ov-today');
        const elDevices = document.getElementById('ov-devices');
        if (elTotal) elTotal.textContent = total;
        if (elStaff) elStaff.textContent = staffFaculty;
        if (elToday) elToday.textContent = logsToday?.total ?? '—';
        let devices = '—';
        if (logsAll && logsAll.total > 0) {
          const devs = await api('/admin/logs?page_size=200');
          if (Array.isArray(devs.items)) {
            const unique = new Set(devs.items.map(l => l.device_id).filter(Boolean));
            devices = unique.size;
          }
        }
        if (elDevices) elDevices.textContent = devices;
        renderLiveFeed(todayItems);
        renderAttendanceBreakdown(allUsers, todayItems);
      } catch { /* keep existing values */ }
      renderDiagnostics();
      if (_overviewInterval) clearInterval(_overviewInterval);
      _overviewInterval = setInterval(async () => {
        try {
          const logsToday = await api('/admin/logs?date_from=' + todayISO() + '&date_to=' + todayISO() + '&page_size=200');
          const users = await api('/admin/users');
          renderLiveFeed(logsToday?.items || []);
          renderAttendanceBreakdown(Array.isArray(users) ? users : [], logsToday?.items || []);
          const elToday = document.getElementById('ov-today');
          if (elToday) elToday.textContent = logsToday?.total ?? '—';
        } catch { /* silent refresh fail */ }
        renderDiagnostics();
      }, 15000);
    }

    let _modalStream = null;

    function initModalCamera() {
      const uploadSec = document.getElementById('modal-upload-section');
      const camSec = document.getElementById('modal-camera-section');
      const video = document.getElementById('modal-video');
      const placeholder = document.getElementById('modal-cam-placeholder');
      const preview = document.getElementById('modal-preview');
      const captureBtn = document.getElementById('btn-modal-capture');
      const retakeBtn = document.getElementById('btn-modal-retake');
      const startBtn = document.getElementById('btn-modal-start-cam');
      let capturedBlob = null;

      document.querySelectorAll('.modal-source-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.modal-source-btn').forEach(b => {
            b.classList.remove('bg-ncst-navy', 'text-white', 'border-ncst-navy');
            b.classList.add('border-slate-300', 'text-slate-600');
          });
          btn.classList.add('bg-ncst-navy', 'text-white', 'border-ncst-navy');
          btn.classList.remove('border-slate-300', 'text-slate-600');
          const src = btn.dataset.source;
          uploadSec.classList.toggle('hidden', src !== 'upload');
          camSec.classList.toggle('hidden', src !== 'camera');
          if (src === 'camera' && !_modalStream) { /* wait for start */ }
          if (src === 'upload' && _modalStream) { stopModalCam(); }
        });
      });

      document.getElementById('modal-photo')?.addEventListener('change', function() {
        document.getElementById('modal-photo-name').textContent = this.files[0]?.name || 'No file selected';
        capturedBlob = null;
      });

      startBtn?.addEventListener('click', async () => {
        try {
          _modalStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
          video.srcObject = _modalStream;
          video.classList.remove('hidden');
          placeholder.classList.add('hidden');
          captureBtn.disabled = false;
        } catch { showToast('Camera access denied', 'error'); }
      });

      captureBtn?.addEventListener('click', () => {
        if (!_modalStream) return;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob((blob) => {
          if (!blob) return;
          capturedBlob = blob;
          preview.src = URL.createObjectURL(blob);
          preview.classList.remove('hidden');
          video.classList.add('hidden');
          captureBtn.disabled = true;
          retakeBtn.classList.remove('hidden');
        }, 'image/jpeg', 0.85);
      });

      retakeBtn?.addEventListener('click', () => {
        capturedBlob = null;
        preview.classList.add('hidden');
        preview.src = '';
        video.classList.remove('hidden');
        captureBtn.disabled = false;
        retakeBtn.classList.add('hidden');
      });
    }

    function stopModalCam() {
      if (_modalStream) { _modalStream.getTracks().forEach(t => t.stop()); _modalStream = null; }
    }

    function initModalForm() {
      const form = document.getElementById('form-register-user');
      const banner = document.getElementById('modal-banner');
      if (!form) return;
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        form.classList.add('was-validated');
        if (!form.checkValidity()) return;
        hideFormError(banner);
        const btn = form.querySelector('button[type="submit"]');
        setLoading(btn, true);
        const fd = new FormData(form);
        const usingCamera = !document.getElementById('modal-camera-section')?.classList.contains('hidden');
        const photoFile = document.getElementById('modal-photo')?.files[0];
        if (!usingCamera && !photoFile) {
          showFormError(banner, 'Please select a profile photo.');
          banner.className = 'hidden text-sm px-3 py-2 rounded mb-4 border bg-red-50 border-red-200 text-red-700';
          banner.classList.remove('hidden');
          setLoading(btn, false);
          return;
        }
        const body = new FormData();

    let _retakeStream = null;

    function stopRetakeCam() {
      if (_retakeStream) { _retakeStream.getTracks().forEach(t => t.stop()); _retakeStream = null; }
    }

    function initRetakeCamera(userId) {
      const uploadSec = document.getElementById('retake-upload-section');
      const camSec = document.getElementById('retake-camera-section');
      const video = document.getElementById('retake-video');
      const placeholder = document.getElementById('retake-cam-placeholder');
      const preview = document.getElementById('retake-preview');
      const captureBtn = document.getElementById('btn-retake-capture');
      const retakeBtn = document.getElementById('btn-retake-retake');
      const startBtn = document.getElementById('btn-retake-start-cam');
      let capturedBlob = null;

      document.querySelectorAll('.retake-source-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.retake-source-btn').forEach(b => {
            b.classList.remove('bg-ncst-navy', 'text-white', 'border-ncst-navy');
            b.classList.add('border-slate-300', 'text-slate-600');
          });
          btn.classList.add('bg-ncst-navy', 'text-white', 'border-ncst-navy');
          btn.classList.remove('border-slate-300', 'text-slate-600');
          const src = btn.dataset.source;
          uploadSec.classList.toggle('hidden', src !== 'upload');
          camSec.classList.toggle('hidden', src !== 'camera');
          if (src === 'upload' && _retakeStream) stopRetakeCam();
        });
      });

      document.getElementById('retake-photo')?.addEventListener('change', function() {
        document.getElementById('retake-photo-name').textContent = this.files[0]?.name || 'No file selected';
        capturedBlob = null;
      });

      startBtn?.addEventListener('click', async () => {
        try {
          _retakeStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
          video.srcObject = _retakeStream;
          video.classList.remove('hidden');
          placeholder.classList.add('hidden');
          captureBtn.disabled = false;
        } catch { showToast('Camera access denied', 'error'); }
      });

      captureBtn?.addEventListener('click', () => {
        if (!_retakeStream) return;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob((blob) => {
          if (!blob) return;
          capturedBlob = blob;
          preview.src = URL.createObjectURL(blob);
          preview.classList.remove('hidden');
          video.classList.add('hidden');
          captureBtn.disabled = true;
          retakeBtn.classList.remove('hidden');
        }, 'image/jpeg', 0.85);
      });

      retakeBtn?.addEventListener('click', () => {
        capturedBlob = null;
        preview.classList.add('hidden');
        preview.src = '';
        video.classList.remove('hidden');
        captureBtn.disabled = false;
        retakeBtn.classList.add('hidden');
      });

      document.getElementById('btn-retake-submit')?.addEventListener('click', async () => {
        const banner = document.getElementById('retake-banner');
        hideFormError(banner);
        const btn = document.getElementById('btn-retake-submit');
        const usingCamera = !camSec?.classList.contains('hidden');
        const photoFile = document.getElementById('retake-photo')?.files[0];
        if (!usingCamera && !photoFile) {
          showFormError(banner, 'Please select or capture a photo.');
          banner.className = 'hidden text-sm px-3 py-2 rounded mb-4 border bg-red-50 border-red-200 text-red-700';
          banner.classList.remove('hidden');
          return;
        }
        setLoading(btn, true);
        const body = new FormData();
        if (usingCamera) {
          if (preview && preview.src) {
            const resp = await fetch(preview.src);
            const blob = await resp.blob();
            body.append('image', blob, 'retake.jpg');
          } else {
            showFormError(banner, 'Please capture a photo first.');
            banner.className = 'hidden text-sm px-3 py-2 rounded mb-4 border bg-red-50 border-red-200 text-red-700';
            banner.classList.remove('hidden');
            setLoading(btn, false);
            return;
          }
        } else if (photoFile) {
          body.append('image', photoFile);
        }
        try {
          const res = await fetch(API_BASE + '/admin/users/' + encodeURIComponent(userId) + '/re-enroll', {
            method: 'POST', body,
            headers: { 'Authorization': 'Bearer ' + State.getToken() }
          });
          if (res.status === 401) { State.clear(); Router.navigate('/login'); return; }
          if (!res.ok) {
            const errData = res.headers.get('content-type')?.includes('application/json') ? await res.json() : null;
            throw new Error(errData?.detail || 'Re-enrollment failed');
          }
          showToast('Photo updated successfully', 'success');
          stopRetakeCam();
          document.getElementById('retake-modal')?.remove();
        } catch (err) {
          if (err.message !== 'Session expired') {
            showFormError(banner, err.message);
            banner.className = 'hidden text-sm px-3 py-2 rounded mb-4 border bg-red-50 border-red-200 text-red-700';
            banner.classList.remove('hidden');
          }
        }
        setLoading(btn, false);
      });
    }

    let _attPage = 1;
    let _attTotal = 0;

    async function loadAttendance(pg) {
      _attPage = pg || 1;
      const tbody = document.getElementById('att-body');
      const pag = document.getElementById('att-pagination');
      if (!tbody) return;
      tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-6 text-center text-slate-400"><span class="spinner align-middle"></span></td></tr>';
      try {
        const data = await api('/admin/logs?page=' + _attPage + '&page_size=20');
        _attTotal = data.total || 0;
        document.getElementById('att-total-label').textContent = _attTotal + ' record' + (_attTotal !== 1 ? 's' : '');
        if (!data.items || data.items.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-6 text-center text-slate-400">No attendance records found.</td></tr>';
          pag.innerHTML = '';
          return;
        }
        const roleBadge = { STUDENT: 'badge-student', STAFF: 'badge-staff', FACULTY: 'badge-faculty' };
        tbody.innerHTML = data.items.map(r => `
          <tr class="border-b border-slate-100 last:border-0">
            <td class="px-4 py-2.5 text-slate-800">${r.first_name || ''} ${r.last_name || ''} <span class="text-xs text-slate-400 font-mono">${r.user_id}</span></td>
            <td class="px-4 py-2.5">${r.role ? `<span class="badge ${roleBadge[r.role] || ''}">${r.role}</span>` : '<span class="text-slate-400">—</span>'}</td>
            <td class="px-4 py-2.5 text-slate-500">${fmtPST(r.logged_at)}</td>
            <td class="px-4 py-2.5 text-slate-400 text-xs hidden sm:table-cell">${r.device_id || '—'}</td>
          </tr>`).join('');
        renderPagination(data.total, data.page, data.page_size || 20);
      } catch { /* keep spinner */ }
    }

    function renderPagination(total, page, pageSize) {
      const pag = document.getElementById('att-pagination');
      const pages = Math.max(1, Math.ceil(total / pageSize));
      if (pages <= 1) { pag.innerHTML = ''; return; }
      let html = '<button class="pagination-btn" id="att-prev" ' + (page <= 1 ? 'disabled' : '') + '>Previous</button>';
      const start = Math.max(1, page - 2);
      const end = Math.min(pages, page + 2);
      if (start > 1) html += '<button class="pagination-btn" data-p="1">1</button>' + (start > 2 ? '<span class="px-1 text-slate-300">\u2026</span>' : '');
      for (let i = start; i <= end; i++) html += '<button class="pagination-btn ' + (i === page ? 'active' : '') + '" data-p="' + i + '">' + i + '</button>';
      if (end < pages) html += (end < pages - 1 ? '<span class="px-1 text-slate-300">\u2026</span>' : '') + '<button class="pagination-btn" data-p="' + pages + '">' + pages + '</button>';
      html += '<button class="pagination-btn" id="att-next" ' + (page >= pages ? 'disabled' : '') + '>Next</button>';
      pag.innerHTML = html;
      pag.querySelectorAll('[data-p]').forEach(btn => btn.addEventListener('click', () => loadAttendance(parseInt(btn.dataset.p))));
      document.getElementById('att-prev')?.addEventListener('click', () => { if (page > 1) loadAttendance(page - 1); });
      document.getElementById('att-next')?.addEventListener('click', () => { if (page < pages) loadAttendance(page + 1); });
    }

          </tr>`).join('');
        renderAuditPagination(data.total, data.page, data.page_size || 20);
      } catch { /* keep spinner */ }
    }

    function renderAuditPagination(total, page, pageSize) {
      const pag = document.getElementById('audit-pagination');
      const pages = Math.max(1, Math.ceil(total / pageSize));
      if (pages <= 1) { pag.innerHTML = ''; return; }
      let html = '<button class="pagination-btn" id="audit-prev" ' + (page <= 1 ? 'disabled' : '') + '>Previous</button>';
      const start = Math.max(1, page - 2);
      const end = Math.min(pages, page + 2);
      if (start > 1) html += '<button class="pagination-btn" data-p="1">1</button>' + (start > 2 ? '<span class="px-1 text-slate-300">\u2026</span>' : '');
      for (let i = start; i <= end; i++) html += '<button class="pagination-btn ' + (i === page ? 'active' : '') + '" data-p="' + i + '">' + i + '</button>';
      if (end < pages) html += (end < pages - 1 ? '<span class="px-1 text-slate-300">\u2026</span>' : '') + '<button class="pagination-btn" data-p="' + pages + '">' + pages + '</button>';
      html += '<button class="pagination-btn" id="audit-next" ' + (page >= pages ? 'disabled' : '') + '>Next</button>';
      pag.innerHTML = html;
      pag.querySelectorAll('[data-p]').forEach(btn => btn.addEventListener('click', () => loadAuditLogs(parseInt(btn.dataset.p))));
      document.getElementById('audit-prev')?.addEventListener('click', () => { if (page > 1) loadAuditLogs(page - 1); });
      document.getElementById('audit-next')?.addEventListener('click', () => { if (page < pages) loadAuditLogs(page + 1); });
    }

    /* ============================================================
       DASHBOARD — SCANNER
       ============================================================ */
    let _dashStream = null;
    let _dashScanning = false;
    let _dashAutoScan = false;
    let _dashCooldownActive = false;
    let _dashCooldownSec = 0;
    let _dashAutoTimer = null;
    let _dashCooldownTimer = null;

    function scannerPanel() {
      return `
<div class="flex flex-col lg:flex-row gap-6">
  <div class="flex-1">
    <div class="border border-slate-200 rounded bg-white p-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-slate-800">Face Scanner</h3>
        <span id="dash-scan-status" class="text-xs text-slate-500">Camera inactive</span>
      </div>
      <div id="dash-cam-container" class="relative bg-black rounded overflow-hidden aspect-[4/3] flex items-center justify-center">
        <video id="dash-video" autoplay playsinline class="w-full h-full object-cover hidden"></video>
        <div id="dash-cam-placeholder" class="text-center p-6">
          <button id="btn-dash-start-cam" class="px-6 py-2.5 bg-ncst-navy text-white rounded text-sm font-medium hover:bg-ncst-navy-light transition-colors">Start Camera</button>
        </div>
        <div class="cam-bracket"><div class="bl"></div><div class="br"></div></div>
        <div id="dash-scan-overlay" class="absolute inset-0 bg-black/60 flex items-center justify-center hidden">
          <div class="text-center">
            <div class="spinner spinner-light !w-8 !h-8 !border-[3px] mx-auto"></div>
            <p class="text-white text-sm mt-3">Scanning face...</p>
          </div>
        </div>
      </div>
      <div class="flex items-center justify-center gap-4 mt-4">
        <button id="btn-dash-scan" class="px-6 py-2.5 bg-ncst-navy text-white rounded text-sm font-medium hover:bg-ncst-navy-light transition-colors disabled:opacity-40 disabled:cursor-not-allowed">Scan Face</button>
        <label class="flex items-center gap-2 cursor-pointer select-none" id="dash-auto-label">
          <span class="text-sm text-slate-600">Auto-scan</span>
          <div class="toggle-track" id="dash-auto-track"><div class="toggle-thumb"></div></div>
        </label>
      </div>
    </div>
  </div>
  <div class="w-full lg:w-80">
    <div class="border border-slate-200 rounded bg-white p-4">
      <h3 class="text-sm font-semibold text-slate-800 mb-3">Scan Results</h3>
      <div id="dash-scan-results" class="space-y-2 text-sm">
        <p class="text-slate-400 text-xs">No scans yet.</p>
      </div>
    </div>
  </div>
</div>`;
    }

    function stopDashStream() {
      if (_dashStream) { _dashStream.getTracks().forEach(t => t.stop()); _dashStream = null; }
      if (_dashAutoTimer) { clearInterval(_dashAutoTimer); _dashAutoTimer = null; }
      if (_dashCooldownTimer) { clearInterval(_dashCooldownTimer); _dashCooldownTimer = null; }
      _dashCooldownActive = false;
    }

    function initDashScanner() {
      const video = document.getElementById('dash-video');
      const placeholder = document.getElementById('dash-cam-placeholder');
      const overlay = document.getElementById('dash-scan-overlay');
      const status = document.getElementById('dash-scan-status');
      const scanBtn = document.getElementById('btn-dash-scan');
      const autoTrack = document.getElementById('dash-auto-track');
      const autoLabel = document.getElementById('dash-auto-label');
      const resultsEl = document.getElementById('dash-scan-results');

      function setStatus(msg) { if (status) status.textContent = msg; }

      function refreshStatus() {
        if (_dashCooldownActive) { setStatus('Cooldown: ' + _dashCooldownSec + 's'); }
        else if (_dashScanning) { setStatus('Scanning\u2026'); }
        else if (_dashStream) { setStatus(_dashAutoScan ? 'Auto-scan active (every 2.5s)' : 'Camera active'); }
        else { setStatus('Camera inactive'); }
      }

      function startCooldown() {
        _dashCooldownActive = true;
        _dashCooldownSec = 6;
        refreshStatus();
        _dashCooldownTimer = setInterval(() => {
          _dashCooldownSec--;
          if (_dashCooldownSec <= 0) {
            clearInterval(_dashCooldownTimer);
            _dashCooldownTimer = null;
            _dashCooldownActive = false;
            refreshStatus();
          } else refreshStatus();
        }, 1000);
      }

      function pushScanResult(data, isError) {
        if (!resultsEl) return;
        const ts = fmtPST(data.logged_at);
        const card = document.createElement('div');
        if (isError) {
          card.className = 'border border-red-200 bg-red-50 rounded p-3 text-xs';
          card.innerHTML = '<div class="font-semibold text-red-800 mb-1">Failed</div><p class="text-red-600">' + (data.detail || data.message || 'Not recognized') + '</p><p class="text-red-400 mt-1">' + ts + '</p>';
        } else {
          card.className = 'border border-emerald-200 bg-emerald-50 rounded p-3 text-xs';
          card.innerHTML = '<div class="font-semibold text-emerald-800 mb-1">' + (data.user_name || 'Unknown') + '</div><p class="text-emerald-600">Check-in successful</p><p class="text-emerald-400 mt-1">' + ts + '</p>';
        }
        resultsEl.prepend(card);
        while (resultsEl.children.length > 10) resultsEl.removeChild(resultsEl.lastChild);
      }

      document.getElementById('btn-dash-start-cam')?.addEventListener('click', async () => {
        try {
          _dashStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
          __activeStream = _dashStream;
          video.srcObject = _dashStream;
          video.classList.remove('hidden');
          placeholder.classList.add('hidden');
          scanBtn.disabled = false;
          refreshStatus();
        } catch { showToast('Camera access denied', 'error'); }
      });

      scanBtn?.addEventListener('click', async () => {
        if (_dashScanning || !_dashStream) return;
        _dashScanning = true;
        overlay.classList.remove('hidden');
        scanBtn.disabled = true;
        refreshStatus();
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(async (blob) => {
          if (!blob) { _dashScanning = false; overlay.classList.add('hidden'); if (!_dashAutoScan) scanBtn.disabled = false; refreshStatus(); return; }
          const fd = new FormData();
          fd.append('device_id', 'dash-scanner-01');
          fd.append('image', blob, 'scan.jpg');
          try {
            const res = await fetch(API_BASE + '/verify', { method: 'POST', body: fd });
            const data = res.headers.get('content-type')?.includes('application/json') ? await res.json() : null;
            if (!res.ok) { pushScanResult(data || { detail: 'Verification failed' }, true); }
            else { pushScanResult(data, false); if (_dashAutoScan) startCooldown(); }
          } catch (err) { pushScanResult({ message: err.message }, true); }
          _dashScanning = false;
          overlay.classList.add('hidden');
          if (!_dashAutoScan) scanBtn.disabled = false;
          refreshStatus();
        }, 'image/jpeg', 0.85);
      });

      autoLabel?.addEventListener('click', (e) => {
        e.preventDefault();
        _dashAutoScan = !_dashAutoScan;
        autoTrack.classList.toggle('active', _dashAutoScan);
        if (_dashAutoScan) {
          scanBtn.disabled = true;
          if (_dashAutoTimer) clearInterval(_dashAutoTimer);
          _dashAutoTimer = setInterval(() => {
            if (!_dashScanning && !_dashCooldownActive && _dashStream) scanBtn.click();
          }, 2500);
        } else {
          if (_dashAutoTimer) { clearInterval(_dashAutoTimer); _dashAutoTimer = null; }
          scanBtn.disabled = !_dashStream;
        }
        refreshStatus();
      });
    }

    /* ============================================================
       DASHBOARD — SETTINGS
       ============================================================ */
    function settingsPanel() {
      return `
<div class="max-w-xl">
  <div class="border border-slate-200 rounded bg-white p-6">
    <h3 class="text-sm font-semibold text-slate-800 mb-1">System Information</h3>
    <p class="text-xs text-slate-500 mb-4">Platform configuration and status.</p>
    <dl class="space-y-2 text-sm">
      <div class="flex justify-between"><dt class="text-slate-500">Version</dt><dd class="text-slate-800 font-medium">1.0.0</dd></div>
      <div class="flex justify-between"><dt class="text-slate-500">Authentication</dt><dd class="text-slate-800 font-medium">JWT (Bearer)</dd></div>
      <div class="flex justify-between"><dt class="text-slate-500">Face Engine</dt><dd class="text-slate-800 font-medium">face_recognition (dlib)</dd></div>
      <div class="flex justify-between"><dt class="text-slate-500">Matching Threshold</dt><dd class="text-slate-800 font-medium">0.65</dd></div>
    </dl>
  </div>
</div>`;
    }

    /* ============================================================
       DASHBOARD — VIEW DISPATCH
       ============================================================ */
    function dashboardView(sub) {
      if (!isAuthenticated()) { Router.navigate('/login'); return ''; }
      sub = sub || 'overview';
      if (!DASH_SUBS.includes(sub)) sub = 'overview';
      let panel = '';
      switch (sub) {
        case 'overview': panel = overviewPanel(); break;
        case 'registrants': panel = registrantsPanel(); break;
        case 'attendance': panel = attendancePanel(); break;
        case 'audit': panel = auditPanel(); break;
        case 'scanner': panel = scannerPanel(); break;
        case 'settings': panel = settingsPanel(); break;
      }
      return dashboardShell(sub, panel);
    }

    dashboardView.handler = (sub) => {
      sub = sub || 'overview';
      if (!isAuthenticated()) return;

      stopDashStream();

      if (_overviewInterval) { clearInterval(_overviewInterval); _overviewInterval = null; }

      document.getElementById('btn-logout')?.addEventListener('click', async () => {
        try { await api('/auth/logout', { method: 'POST' }); } catch {}
        State.clear();
        showToast('Signed out', 'info');
        window.location.href = '/login';
      });

      switch (sub) {
        case 'overview':
          loadOverview();
          document.getElementById('btn-launch-terminal')?.addEventListener('click', () => Router.navigate('/terminal'));
          document.getElementById('btn-export-csv')?.addEventListener('click', exportLogsCSV);
          document.getElementById('btn-quick-register')?.addEventListener('click', showRegisterModal);
          break;
        case 'registrants':
          loadDirectory();
          document.getElementById('dir-search')?.addEventListener('input', applyFilters);
          document.getElementById('dir-role-filter')?.addEventListener('change', applyFilters);
          document.getElementById('dir-status-filter')?.addEventListener('change', applyFilters);
          document.getElementById('btn-add-user')?.addEventListener('click', showRegisterModal);
          break;
        case 'attendance':
          loadAttendance(1);
          document.getElementById('btn-refresh-att')?.addEventListener('click', () => loadAttendance(_attPage));
          break;
        case 'audit':
          loadAuditLogs(1);
          document.getElementById('btn-refresh-audit')?.addEventListener('click', () => loadAuditLogs(_auditPage));
          break;
        case 'scanner':
          setTimeout(initDashScanner, 0);
          break;
      }
    };

    /* ============================================================
       REGISTER ROUTES
       ============================================================ */
    Router.add('/login',           (p) => { window.location.href = '/login'; return ''; });
    Router.add('/register-admin',  (p) => { setTimeout(registerAdminView.handler, 0);  return registerAdminView(); });
    Router.add('/forgot-password', (p) => { window.location.href = '/forgot-password'; return ''; });
    Router.add('/terminal',        (p) => { setTimeout(terminalView.handler, 0);       return terminalView(); });
    Router.add('/dashboard',       (p) => { setTimeout(() => dashboardView.handler(), 0);  return dashboardView('overview'); });
    Router.add('/dashboard/:sub',  (p) => { setTimeout(() => dashboardView.handler(p.sub), 0); return dashboardView(p.sub); });

    /* ============================================================
       BOOT
       ============================================================ */
    function bootApp() { Router.init(); }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bootApp);
    } else {
      bootApp();
    }
  </script>
</body>
