<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCST Face Recognition — Forgot Password</title>
  <style>
    :root {
      --ncst-navy: #0a2463;
      --ncst-navy-light: #1e3a7a;
      --ncst-yellow: #ffd100;
      --ncst-text: #0a2463;
      --ncst-muted: #5a6b8c;
      --ncst-border: #c5cfe0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      background: var(--ncst-navy);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    body::before {
      width: 420px;
      height: 420px;
      top: -120px;
      left: -100px;
    }

    body::after {
      width: 520px;
      height: 520px;
      bottom: -180px;
      right: -140px;
      background: rgba(255, 255, 255, 0.03);
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem 2.25rem 2rem;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
      border-top: 4px solid var(--ncst-yellow);
      border-bottom: 4px solid var(--ncst-yellow);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .logo-wrap img {
      width: 120px;
      height: auto;
      object-fit: contain;
    }

    .title {
      text-align: center;
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--ncst-text);
      margin-bottom: 0.375rem;
    }

    .subtitle {
      text-align: center;
      font-size: 0.875rem;
      color: var(--ncst-muted);
      margin-bottom: 1.75rem;
    }

    .steps {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .step-dot {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8125rem;
      font-weight: 600;
      background: #e2e8f0;
      color: var(--ncst-muted);
    }

    .step-dot.active {
      background: var(--ncst-navy);
      color: #fff;
    }

    .step-dot.done {
      background: #059669;
      color: #fff;
    }

    .banner {
      display: none;
      font-size: 0.8125rem;
      padding: 0.625rem 0.875rem;
      border-radius: 6px;
      margin-bottom: 1rem;
    }

    .banner.show { display: block; }
    .banner.error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
    .banner.success { background: #ecfdf5; border: 1px solid #a7f3d0; color: #047857; }

    .panel { display: none; }
    .panel.active { display: block; }

    .field { margin-bottom: 1.125rem; }

    .field label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--ncst-text);
      margin-bottom: 0.375rem;
    }

    .field input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1.5px solid var(--ncst-border);
      border-radius: 8px;
      font-size: 0.9375rem;
      color: var(--ncst-text);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input::placeholder { color: #94a3b8; }

    .field input:focus {
      outline: none;
      border-color: var(--ncst-navy);
      box-shadow: 0 0 0 3px rgba(10, 36, 99, 0.12);
    }

    .otp-input {
      letter-spacing: 0.35em;
      text-align: center;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: var(--ncst-navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover:not(:disabled) { background: var(--ncst-navy-light); }
    .btn:active:not(:disabled) { transform: scale(0.99); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: var(--ncst-navy);
      border: 1.5px solid var(--ncst-border);
      margin-top: 0.75rem;
    }

    .btn-secondary:hover:not(:disabled) { background: #f8fafc; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.8125rem;
      color: var(--ncst-navy);
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }

    .email-display {
      text-align: center;
      font-size: 0.875rem;
      color: var(--ncst-muted);
      margin-bottom: 1rem;
    }

    .email-display strong { color: var(--ncst-text); }

    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/static/images/ncst-logo.png" alt="NCST Logo">
    </div>
    <h1 class="title">Reset Password</h1>
    <p class="subtitle">We'll send a verification code to your email</p>

    <div class="steps">
      <div class="step-dot active" id="dot-1">1</div>
      <div class="step-dot" id="dot-2">2</div>
    </div>

    <div id="banner" class="banner" role="alert"></div>

    <!-- Step 1: Request OTP -->
    <div id="panel-1" class="panel active">
      <form id="form-request-otp" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" required autocomplete="email"
            placeholder="Enter your admin email">
        </div>
        <button type="submit" class="btn" id="btn-send-otp">Send verification code</button>
      </form>
    </div>

    <!-- Step 2: Enter OTP + new password -->
    <div id="panel-2" class="panel">
      <p class="email-display">Code sent to <strong id="email-display"></strong></p>
      <form id="form-reset" novalidate>
        <div class="field">
          <label for="otp">Verification code</label>
          <input type="text" id="otp" name="otp" required maxlength="6" pattern="[0-9]{6}"
            class="otp-input" placeholder="000000" inputmode="numeric" autocomplete="one-time-code">
        </div>
        <div class="field">
          <label for="new-password">New password</label>
          <input type="password" id="new-password" name="new_password" required minlength="6"
            autocomplete="new-password" placeholder="At least 6 characters">
        </div>
        <div class="field">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" required minlength="6"
            autocomplete="new-password" placeholder="Re-enter new password">
        </div>
        <button type="submit" class="btn" id="btn-reset">Reset password</button>
        <button type="button" class="btn btn-secondary" id="btn-resend">Resend code</button>
      </form>
    </div>

    <a href="/login" class="back-link">Back to sign in</a>
  </div>

  <script>
    const API_BASE = '/api/v1';
    let currentEmail = '';

    const banner = document.getElementById('banner');
    const panel1 = document.getElementById('panel-1');
    const panel2 = document.getElementById('panel-2');
    const dot1 = document.getElementById('dot-1');
    const dot2 = document.getElementById('dot-2');
    const emailDisplay = document.getElementById('email-display');

    function showBanner(message, type) {
      banner.textContent = message;
      banner.className = 'banner show ' + type;
    }

    function hideBanner() {
      banner.className = 'banner';
      banner.textContent = '';
    }

    function setLoading(btn, loading) {
      if (loading) {
        btn.disabled = true;
        btn.dataset.origText = btn.textContent;
        btn.innerHTML = '<span class="spinner"></span>';
      } else {
        btn.disabled = false;
        btn.textContent = btn.dataset.origText || btn.textContent;
      }
    }

    function goToStep2(email) {
      currentEmail = email;
      emailDisplay.textContent = email;
      panel1.classList.remove('active');
      panel2.classList.add('active');
      dot1.classList.remove('active');
      dot1.classList.add('done');
      dot1.textContent = '✓';
      dot2.classList.add('active');
      document.getElementById('otp').focus();
    }

    async function requestOtp(email, btn) {
      hideBanner();
      setLoading(btn, true);
      try {
        const res = await fetch(API_BASE + '/auth/forgot-password/request-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email.trim().toLowerCase() })
        });
        const data = await res.json().catch(() => null);
        if (!res.ok) throw new Error(data?.detail || 'Failed to send verification code');
        showBanner(data.message || 'Verification code sent.', 'success');
        goToStep2(email.trim().toLowerCase());
      } catch (err) {
        showBanner(err.message, 'error');
      } finally {
        setLoading(btn, false);
      }
    }

    document.getElementById('form-request-otp').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showBanner('Please enter your email address.', 'error');
        return;
      }
      await requestOtp(email, document.getElementById('btn-send-otp'));
    });

    document.getElementById('btn-resend').addEventListener('click', async () => {
      if (!currentEmail) return;
      await requestOtp(currentEmail, document.getElementById('btn-resend'));
    });

    document.getElementById('form-reset').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideBanner();

      const otp = document.getElementById('otp').value.trim();
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn = document.getElementById('btn-reset');

      if (!/^\d{6}$/.test(otp)) {
        showBanner('Please enter the 6-digit verification code.', 'error');
        return;
      }
      if (newPassword.length < 6) {
        showBanner('Password must be at least 6 characters.', 'error');
        return;
      }
      if (newPassword !== confirmPassword) {
        showBanner('Passwords do not match.', 'error');
        return;
      }

      setLoading(btn, true);
      try {
        const res = await fetch(API_BASE + '/auth/forgot-password/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: currentEmail,
            otp,
            new_password: newPassword
          })
        });
        const data = await res.json().catch(() => null);
        if (!res.ok) throw new Error(data?.detail || 'Failed to reset password');

        showBanner('Password reset successfully! Redirecting to sign in…', 'success');
        dot2.classList.remove('active');
        dot2.classList.add('done');
        dot2.textContent = '✓';
        setTimeout(() => window.location.replace('/login'), 2000);
      } catch (err) {
        showBanner(err.message, 'error');
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
